<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Scribing Calculator – TTWR Tools</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #cccccc;
      --text: #333333;
      --text-muted: #555555;
      --heading: #2c3e50;
      --spell-bg: #ecf0f1;
      --output-bg: #f4f4f4;
      --output-border: #dddddd;
      --input-bg: #ffffff;
      --btn-primary: #3498db;
      --btn-primary-hover: #2980b9;
      --btn-danger: #dc3545;
      --btn-danger-hover: #c0392b;
      --btn-warn: #e67e22;
      --btn-warn-hover: #d35400;
      --btn-neutral: #6c757d;
      --btn-neutral-hover: #5a6268;
      --header-bg: #2c3e50;
      --header-text: #ffffff;
      --header-link: #a8d8ea;
      --header-link-hover: #ffffff;
    }
    body.dark {
      --bg: #1e1e1e;
      --surface: #2a2a2a;
      --border: #484848;
      --text: #e0e0e0;
      --text-muted: #b0b0b0;
      --heading: #cccccc;
      --spell-bg: #303030;
      --output-bg: #222222;
      --output-border: #484848;
      --input-bg: #333333;
      --btn-primary: #2271a3;
      --btn-primary-hover: #1a5a85;
      --btn-danger: #a32b38;
      --btn-danger-hover: #882330;
      --btn-warn: #a85a18;
      --btn-warn-hover: #8a4912;
      --btn-neutral: #555e66;
      --btn-neutral-hover: #444c53;
      --header-bg: #1a1a1a;
      --header-text: #e0e0e0;
      --header-link: #90c0d8;
      --header-link-hover: #e0e0e0;
    }

    /* Header */
    #site-header { background: var(--header-bg); color: var(--header-text); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 24px; height: 52px; }
    .site-title { font-size: 1.1em; font-weight: bold; color: var(--header-text); white-space: nowrap; }
    nav { display: flex; gap: 16px; flex: 1; }
    nav a { color: var(--header-link); text-decoration: none; font-size: 0.95em; }
    nav a:hover { color: var(--header-link-hover); text-decoration: underline; }
    #darkModeToggle { background: transparent; border: 1px solid var(--header-link); color: var(--header-text); padding: 4px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; margin: 0; white-space: nowrap; }
    #darkModeToggle:hover { background: rgba(255,255,255,0.1); }

    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background-color: var(--bg);
      color: var(--text);
    }
    h1 { color: var(--text); text-align: center; }
    .player-info {
      background: var(--surface);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .player-info input[type="text"] { padding: 6px; width: 200px; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
    #spellbooksContainer { margin-bottom: 20px; }
    .spellbook {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      color: var(--text);
    }
    .spellbook h3 { margin-top: 0; color: var(--heading); }
    label { display: block; margin: 8px 0; }
    input[type="number"] { width: 80px; padding: 4px; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
    input[type="text"] { width: 300px; padding: 6px; margin: 10px 0; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
    input[type="checkbox"] { margin-right: 8px; }
    select { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px; }
    button {
      background-color: var(--btn-primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background-color: var(--btn-primary-hover); }
    .delete-spell { background-color: var(--btn-danger); padding: 2px 8px; font-size: 12px; }
    .delete-spell:hover { background-color: var(--btn-danger-hover); }
    .spellList { padding-left: 0; }
    .spellList li { padding: 5px; margin: 3px 0; background-color: var(--spell-bg); border-radius: 4px; }
    #output, #discordMessages {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 16px;
      white-space: pre-wrap;
      font-family: monospace;
      color: var(--text);
    }
    pre { background: var(--output-bg) !important; border-color: var(--output-border) !important; color: var(--text) !important; }
    .spell-chip { background-color: var(--spell-bg); color: var(--text); }
    .badge-state-row { color: var(--text-muted); }
    .autocomplete-items div { padding: 8px; cursor: pointer; border-bottom: 1px solid var(--border); background: var(--surface); color: var(--text); }
    .autocomplete-items div:hover { background-color: var(--spell-bg); }
    @media (max-width: 900px) {
      .layout-columns { flex-direction: column !important; }
      .layout-right { width: 100% !important; position: static !important; max-height: none !important; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <h1>D&D Spell Scribing Calculator</h1>

  <div class="layout-columns" style="display: flex; gap: 24px; align-items: flex-start;">

    <!-- Left column: controls and spellbooks -->
    <div style="flex: 1; min-width: 0;">
      <div class="player-info">
        <div style="margin-bottom: 8px;">
          <label for="playerName" style="display: inline; font-weight: bold; margin-right: 10px;">Player Name:</label>
          <input type="text" id="playerName" value="Drotar" placeholder="Enter player name">
        </div>
        <label>
          <input type="checkbox" id="combinedModOutput" checked> Combined modifier output
        </label>
        <label>
          <input type="checkbox" id="legacyCharacter"> Legacy character
        </label>
      </div>

      <button id="addBook">+ Add Spellbook</button>
      <button id="wipeSpells" style="background-color: var(--btn-warn);">🗑 Wipe All Spells</button>
      <div id="spellbooksContainer"></div>
    </div>

    <!-- Right column: output, sticky so it stays in view while scrolling -->
    <div class="layout-right" style="width: 380px; flex-shrink: 0; position: sticky; top: 72px; max-height: calc(100vh - 92px); overflow-y: auto;">
      <div id="output"></div>
      <div id="discordMessages"></div>
    </div>

  </div>
  <script src="../SiteTools/loadHeader.js"></script>
  <script src="script.js"></script>
</body>
</html>
