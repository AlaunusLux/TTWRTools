<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Materials Search</title>
  <link rel="stylesheet" href="../SiteTools/site.css">
</head>

<body>
  <div id="header-placeholder"></div>
  <h1>Crafting Material Search</h1>
  <fieldset>
    <legend>Choose crafting materials to display:</legend>

    <div>
      <label>
        <input type="checkbox" id="reagents" name="reagents" onchange="searchCraftables()" />
        Reagents
      </label>
    </div>

    <div>
      <label>
        <input type="checkbox" id="wood" name="wood" onchange="searchCraftables()" />
        Wood
      </label>
    </div>

    <div>
      <label>
        <input type="checkbox" id="magica" name="magica" onchange="searchCraftables()" />
        Magica
      </label>
    </div>

    <div>
      <label>
        <input type="checkbox" id="leather" name="leather" onchange="searchCraftables()" />
        Leather
      </label>
    </div>

    <div>
      <label>
        <input type="checkbox" id="cloth" name="cloth" onchange="searchCraftables()" />
        Cloth
      </label>
    </div>

    <div>
      <label>
        <input type="checkbox" id="metal" name="metal" onchange="searchCraftables()" />
        Metal
      </label>
    </div>
  </fieldset>
  <hr />
  <div><label>Paste Shop Data here:</label></div>
  <textarea id="search-keys" rows="10" cols="60" onkeyup="searchCraftables()"></textarea>
  <div id="results-display"></div>
  <br />
  <div id="purchase-log-output"></div>
  <br /><br />
  <div id="unmatched-items"></div>

  <script src="../SiteTools/loadHeader.js"></script>
  <script src="craftables.js"></script>
  <script src="script.js"></script>
</body>

</html>
