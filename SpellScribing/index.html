<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Scribing Calculator</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #cccccc;
      --text: #333333;
      --text-muted: #555555;
      --heading: #2c3e50;
      --spell-bg: #ecf0f1;
      --output-bg: #f4f4f4;
      --output-border: #dddddd;
      --input-bg: #ffffff;
    }
    body.dark {
      --bg: #1e1e1e;
      --surface: #2a2a2a;
      --border: #484848;
      --text: #e0e0e0;
      --text-muted: #b0b0b0;
      --heading: #cccccc;
      --spell-bg: #303030;
      --output-bg: #222222;
      --output-border: #484848;
      --input-bg: #333333;
    }
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background-color: var(--bg);
      color: var(--text);
    }
    h1 { color: var(--text); text-align: center; }
    .player-info {
      background: var(--surface);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .player-info label { display: inline-block; margin-right: 10px; font-weight: bold; }
    .player-info input { padding: 6px; width: 200px; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
    #spellbooksContainer { margin-bottom: 20px; }
    .spellbook {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      color: var(--text);
    }
    .spellbook h3 { margin-top: 0; color: var(--heading); }
    label { display: block; margin: 8px 0; }
    input[type="number"] { width: 80px; padding: 4px; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
    input[type="text"] { width: 300px; padding: 6px; margin: 10px 0; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
    input[type="checkbox"] { margin-right: 8px; }
    select { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px; }
    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background-color: #2980b9; }
    .delete-spell { background-color: #e74c3c; padding: 2px 8px; font-size: 12px; }
    .delete-spell:hover { background-color: #c0392b; }
    .spellList { padding-left: 0; }
    .spellList li { padding: 5px; margin: 3px 0; background-color: var(--spell-bg); border-radius: 4px; }
    #output, #discordMessages {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 16px;
      white-space: pre-wrap;
      font-family: monospace;
      color: var(--text);
    }
    pre { background: var(--output-bg) !important; border-color: var(--output-border) !important; color: var(--text) !important; }
    .spell-chip { background-color: var(--spell-bg); color: var(--text); }
    .badge-state-row { color: var(--text-muted); }
    .autocomplete-items div { padding: 8px; cursor: pointer; border-bottom: 1px solid var(--border); background: var(--surface); color: var(--text); }
    .autocomplete-items div:hover { background-color: var(--spell-bg); }
    @media (max-width: 900px) {
      .layout-columns { flex-direction: column !important; }
      .layout-right { width: 100% !important; position: static !important; max-height: none !important; }
    }
  </style>
</head>
<body>
  <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 10px;">
    <h1 style="margin: 0;">D&D Spell Scribing Calculator</h1>
    <button id="darkModeToggle" style="background: #444; padding: 6px 14px; font-size: 13px; white-space: nowrap;">🌙 Dark Mode</button>
  </div>

  <div class="layout-columns" style="display: flex; gap: 24px; align-items: flex-start;">

    <!-- Left column: controls and spellbooks -->
    <div style="flex: 1; min-width: 0;">
      <div class="player-info">
        <label for="playerName">Player Name:</label>
        <input type="text" id="playerName" value="Drotar" placeholder="Enter player name">
        <label style="margin-left: 20px;">
          <input type="checkbox" id="combinedModOutput" checked> Combined modifier output
        </label>
      </div>

      <button id="addBook">+ Add Spellbook</button>
      <button id="wipeSpells" style="background-color: #e67e22;">🗑 Wipe All Spells</button>
      <div id="spellbooksContainer"></div>
    </div>

    <!-- Right column: output, sticky so it stays in view while scrolling -->
    <div class="layout-right" style="width: 380px; flex-shrink: 0; position: sticky; top: 20px; max-height: calc(100vh - 40px); overflow-y: auto;">
      <div id="output"></div>
      <div id="discordMessages"></div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
